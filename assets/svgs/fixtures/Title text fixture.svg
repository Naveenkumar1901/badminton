<svg id="Title_text_fixture" data-name="Title text fixture" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1000" height="50" viewBox="0 0 1000 50">
  <defs>
    <style>
      .cls-1, .cls-3 {
        font-size: 50px;
      }

      .cls-1 {
        filter: url(#filter);
        fill: #981112;
        font-family: GoldenVarsity-Outline, "Golden Varsity";
      }

      .cls-2 {
        font-variant: small-caps;
      }

      .cls-3 {
        fill: #edebe5;
        font-family: "Golden Varsity";
      }
    </style>
    <filter id="filter" x="0" y="0" width="201" height="50" filterUnits="userSpaceOnUse">
      <feOffset result="offset" in="SourceAlpha"/>
      <feGaussianBlur result="blur" stdDeviation="2.236"/>
      <feFlood result="flood" flood-opacity="0.75"/>
      <feComposite result="composite" operator="in" in2="blur"/>
      <feBlend result="blend" in="SourceGraphic"/>
    </filter>
  </defs>
  <text id="Fixtures_selected" data-name="Fixtures selected" class="cls-1" x="7.274" y="42.45">F<tspan class="cls-2">ixtures</tspan></text>
  <text id="Result" class="cls-3" x="358.274" y="42.45">R<tspan class="cls-2">esult</tspan></text>
  <text id="Point_Table" data-name="Point Table" class="cls-3" x="630.274" y="42.45">P<tspan class="cls-2">oint</tspan> T<tspan>able</tspan></text>
</svg>
